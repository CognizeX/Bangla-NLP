version: "3.9"

services:
  nlp:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nlp-container
    working_dir: /app
    volumes:
      - ./:/app
      - model_weights:/app/model_weights
    ports:
      - "8000:8000"   # FastAPI
    environment:
      DATABASE_URL: postgresql://nlp:nlp@postgres:5432/nlpdb
      QDRANT_URL: http://qdrant:6333
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    depends_on:
      - postgres
      - qdrant

  jupyter:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nlp-jupyter
    working_dir: /app
    volumes:
      - ./:/app
      - model_weights:/app/model_weights
    ports:
      - "8888:8888"
    environment:
      DATABASE_URL: postgresql://nlp:nlp@postgres:5432/nlpdb
      QDRANT_URL: http://qdrant:6333
    command:
      [
        "jupyter",
        "lab",
        "--ip=0.0.0.0",
        "--port=8888",
        "--no-browser",
        "--allow-root",
        "--ServerApp.token=",
        "--ServerApp.password="
      ]
    depends_on:
      - postgres
      - qdrant

  postgres:
    image: postgres:16
    container_name: nlp-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: nlpdb
      POSTGRES_USER: nlp
      POSTGRES_PASSWORD: nlp
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  qdrant:
    image: qdrant/qdrant:v1.9.2
    container_name: nlp-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage

volumes:
  model_weights:
  postgres_data:
  qdrant_data:
